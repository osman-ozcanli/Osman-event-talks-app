<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Explorer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="shortcut icon" href="https://www.gstatic.com/images/branding/product/2x/bigquery_64dp.png" type="image/x-icon">
</head>
<body class="dark-theme">
    <!-- Background Glows -->
    <div class="glow-bg glow-primary"></div>
    <div class="glow-bg glow-secondary"></div>

    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2005/svg">
                        <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM9 17H7V10H9V17ZM13 17H11V7H13V17ZM17 17H15V13H17V17Z" fill="url(#logo-grad)"/>
                        <defs>
                            <linearGradient id="logo-grad" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#38bdf8"/>
                                <stop offset="1" stop-color="#818cf8"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BQ Release Pulse</h1>
                    <p>Live BigQuery Release Monitor</p>
                </div>
            </div>

            <div class="stats-banner">
                <div class="stat-card">
                    <span class="stat-label">Total Updates</span>
                    <span class="stat-value" id="total-count">-</span>
                </div>
            </div>

            <div class="action-bar">
                <button id="btn-refresh" class="btn btn-primary" title="Refresh Release Notes">
                    <svg class="icon-spin-target" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh Feed</span>
                </button>
            </div>
        </header>

        <!-- Main Body -->
        <main class="app-main">
            <!-- Filter & Search Panel -->
            <section class="filter-panel card">
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search keywords, features, functions...">
                </div>

                <div class="category-filters">
                    <button class="filter-pill active" data-category="all">
                        <span class="pill-dot" style="background-color: var(--primary);"></span>
                        All Updates <span class="pill-count" id="count-all">0</span>
                    </button>
                    <button class="filter-pill" data-category="Feature">
                        <span class="pill-dot" style="background-color: var(--cat-feature);"></span>
                        Features <span class="pill-count" id="count-feature">0</span>
                    </button>
                    <button class="filter-pill" data-category="Announcement">
                        <span class="pill-dot" style="background-color: var(--cat-announcement);"></span>
                        Announcements <span class="pill-count" id="count-announcement">0</span>
                    </button>
                    <button class="filter-pill" data-category="Change">
                        <span class="pill-dot" style="background-color: var(--cat-change);"></span>
                        Changes <span class="pill-count" id="count-change">0</span>
                    </button>
                    <button class="filter-pill" data-category="Breaking">
                        <span class="pill-dot" style="background-color: var(--cat-breaking);"></span>
                        Breaking <span class="pill-count" id="count-breaking">0</span>
                    </button>
                    <button class="filter-pill" data-category="Issue">
                        <span class="pill-dot" style="background-color: var(--cat-issue);"></span>
                        Issues <span class="pill-count" id="count-issue">0</span>
                    </button>
                </div>
            </section>

            <!-- Release Notes Feed -->
            <section class="feed-section">
                <!-- Loading State Shimmer -->
                <div id="feed-loading" class="loading-container">
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                </div>

                <!-- Empty State -->
                <div id="feed-empty" class="empty-state card hidden">
                    <div class="empty-icon">📂</div>
                    <h3>No release notes found</h3>
                    <p>Try resetting your filters or refreshing the feed.</p>
                </div>

                <!-- Actual Feed Cards -->
                <div id="feed-container" class="feed-grid"></div>
            </section>
        </main>
    </div>

    <!-- Twitter Composer Modal (Glassmorphism Overlay) -->
    <div id="tweet-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="twitter-logo-circle">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </div>
                    <h3>Draft your Tweet</h3>
                </div>
                <button class="btn-close" id="modal-close">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="selected-update-preview">
                    <div class="preview-meta">
                        <span class="preview-badge" id="preview-badge-cat">Feature</span>
                        <span class="preview-date" id="preview-badge-date">June 17, 2026</span>
                    </div>
                    <div class="preview-text" id="preview-original-text"></div>
                </div>

                <div class="composer-container">
                    <label for="tweet-textarea">Compose Tweet text:</label>
                    <textarea id="tweet-textarea" rows="5" maxlength="280"></textarea>
                    
                    <div class="composer-footer">
                        <div class="character-counter">
                            <svg class="progress-ring" width="30" height="30">
                                <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.08)" stroke-width="3" fill="transparent" r="12" cx="15" cy="15"/>
                                <circle class="progress-ring__circle" stroke="var(--primary)" stroke-width="3" fill="transparent" r="12" cx="15" cy="15"/>
                            </svg>
                            <span id="char-count-text">280</span>
                        </div>
                        <div class="helper-buttons">
                            <button id="btn-shorten" class="btn btn-outline btn-xs" title="Shorten content to fit character limit">
                                🪄 Shorten Text
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                <a id="btn-tweet-action" href="#" target="_blank" class="btn btn-twitter">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Post to X / Twitter
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
